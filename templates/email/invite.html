<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family:Arial,sans-serif;background:#f8fafc;padding:2rem">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:500px;margin:0 auto">
  <tr><td style="background:#0a1628;padding:1.5rem;border-radius:12px 12px 0 0;text-align:center">
    <span style="font-size:1.3rem;font-weight:800;color:#fff">🛡️ Defence<span style="color:#3b82f6">IQ</span></span>
  </td></tr>
  <tr><td style="background:#fff;padding:2rem;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 12px 12px">
    <h2 style="color:#0f172a;font-size:1.2rem;margin-bottom:.5rem">You've been invited to DefenceIQ</h2>
    <p style="color:#64748b;font-size:.9rem;margin-bottom:1rem">{{ inviter.full_name }} has invited you to join <strong>{{ org.name }}</strong> on DefenceIQ.</p>
    <div style="background:#f8fafc;border-radius:10px;padding:1rem;margin-bottom:1.5rem">
      <div style="font-size:.82rem;color:#64748b;margin-bottom:.25rem">Your temporary password:</div>
      <div style="font-family:monospace;font-size:1rem;font-weight:700;color:#0f172a">{{ temp_pass }}</div>
    </div>
    <a href="https://defenceiq.io/login" style="display:inline-block;background:#2563eb;color:#fff;padding:.75rem 2rem;border-radius:9px;font-weight:700;text-decoration:none;font-size:.9rem">Accept Invitation →</a>
    <p style="color:#94a3b8;font-size:.8rem;margin-top:1.5rem">Please change your password after first login.</p>
  </td></tr>
  <tr><td style="padding:1rem;text-align:center;font-size:.78rem;color:#94a3b8">© 2026 DefenceIQ by Fa3Tech Limited</td></tr>
</table>
</body>
</html>
