<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family:Arial,sans-serif;background:#f8fafc;padding:2rem">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:500px;margin:0 auto">
  <tr><td style="background:#0a1628;padding:1.5rem;border-radius:12px 12px 0 0;text-align:center">
    <span style="font-size:1.3rem;font-weight:800;color:#fff">🛡️ Defence<span style="color:#3b82f6">IQ</span></span>
  </td></tr>
  <tr><td style="background:#fff;padding:2rem;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 12px 12px">
    <h2 style="color:#0f172a;font-size:1.2rem;margin-bottom:.5rem">Verify your email</h2>
    <p style="color:#64748b;font-size:.9rem;margin-bottom:1.5rem">Hi {{ user.full_name }}, enter this code to verify your DefenceIQ account:</p>
    <div style="background:#eff6ff;border:2px solid #dbeafe;border-radius:12px;padding:1.5rem;text-align:center;margin-bottom:1.5rem">
      <div style="font-size:2.5rem;font-weight:800;letter-spacing:.4em;color:#2563eb;font-family:monospace">{{ otp }}</div>
      <div style="font-size:.78rem;color:#64748b;margin-top:.5rem">Expires in 15 minutes</div>
    </div>
    <p style="color:#94a3b8;font-size:.8rem">If you did not create a DefenceIQ account, ignore this email.</p>
  </td></tr>
  <tr><td style="padding:1rem;text-align:center;font-size:.78rem;color:#94a3b8">© 2026 DefenceIQ by Fa3Tech Limited</td></tr>
</table>
</body>
</html>
